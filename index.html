<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/post-maker/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="Crie carrosséis de fotos lindos para o Instagram em minutos, direto do navegador."
    />
    <title>Post Maker</title>
    <script>
      // Rede de segurança contra tela branca. Inline e sem hash: roda mesmo se o
      // bundle principal falhar ao carregar/avaliar.
      ;(function () {
        var errors = []
        function cleanupAndReload() {
          var p = []
          if ('serviceWorker' in navigator) {
            p.push(
              navigator.serviceWorker
                .getRegistrations()
                .then(function (rs) {
                  return Promise.all(
                    rs.map(function (r) {
                      return r.unregister()
                    }),
                  )
                })
                .catch(function () {}),
            )
          }
          if (window.caches) {
            p.push(
              caches
                .keys()
                .then(function (ks) {
                  return Promise.all(
                    ks.map(function (k) {
                      return caches.delete(k)
                    }),
                  )
                })
                .catch(function () {}),
            )
          }
          var reload = function () {
            location.reload()
          }
          Promise.all(p).then(reload, reload)
        }
        window.__pmCleanup = cleanupAndReload

        window.addEventListener(
          'error',
          function (e) {
            var t = e && e.target
            if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK')) {
              var url = t.src || t.href || ''
              errors.push('Falha ao carregar: ' + url)
              // Chunk versionado ausente (SW/cache antigo após deploy): recupera 1x.
              if (url.indexOf('/assets/') !== -1 && !sessionStorage.getItem('pm-recovered')) {
                sessionStorage.setItem('pm-recovered', '1')
                cleanupAndReload()
              }
            } else if (e && e.message) {
              errors.push(
                'Erro: ' + e.message + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''),
              )
            }
          },
          true,
        )
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason
          errors.push('Falha: ' + ((r && (r.message || r.stack)) || r || 'desconhecida'))
        })

        // Se o app não montar em alguns segundos, mostra o erro (em vez de branco).
        // Dispara por timer próprio — não depende de 'load' (que pode não ocorrer).
        var shown = false
        function showDiagnostic() {
          if (shown) return
          var root = document.getElementById('root')
          if (!root || root.childElementCount > 0) return
          shown = true
          var detail =
            (errors.join('\n') || 'O app não chegou a executar (sem erro de JS capturado).') +
            '\n\nNavegador: ' +
            navigator.userAgent
          detail = detail.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          root.innerHTML =
            '<div style="font-family:system-ui,-apple-system,sans-serif;padding:28px 20px;max-width:520px;margin:0 auto;text-align:center">' +
            '<h1 style="font-size:1.3rem;margin:0 0 8px">Não foi possível abrir o app</h1>' +
            '<p style="color:#6b7280;margin:0 0 14px">Toque para limpar o cache e recarregar. Se persistir, mande um print deste texto.</p>' +
            '<button onclick="window.__pmCleanup()" style="padding:13px 22px;border:none;border-radius:999px;background:#f97316;color:#fff;font-weight:600;font-size:1rem">Limpar cache e recarregar</button>' +
            '<pre style="white-space:pre-wrap;text-align:left;background:#f4f4f5;color:#111;padding:12px;border-radius:10px;font-size:12px;margin-top:18px;overflow:auto">' +
            detail +
            '</pre></div>'
        }
        setTimeout(showDiagnostic, 5000)
        window.addEventListener('load', function () {
          setTimeout(showDiagnostic, 4000)
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
